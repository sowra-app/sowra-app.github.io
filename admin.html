<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإشراف — صورة من بلدي</title>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="supabase.js"></script>
<style>
:root{--night:#141210;--card:#1E1A16;--card2:#26211B;--sand:#E8CF9F;--sand-dim:#B29B72;--sadu:#C0392B;--palm:#4E7A4C;--star:#F2B33D;--line:#332C24;--txt:#F3EADB;--txt-dim:#A69880}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--night);color:var(--txt);max-width:560px;margin:0 auto;padding:0 16px 60px;min-height:100vh}
.sadu{height:8px;margin:0 -16px;background:repeating-linear-gradient(45deg,var(--sadu) 0 8px,var(--night) 8px 16px,var(--sand) 16px 24px,var(--night) 24px 32px)}
h1{font-family:'Reem Kufi',sans-serif;color:var(--sand);font-size:22px;padding:18px 0 4px}
.sub{color:var(--txt-dim);font-size:13px;margin-bottom:18px}
.box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--txt);font-family:'Tajawal';font-size:14px;outline:none;margin-bottom:10px}
.btn{background:var(--sadu);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-family:'Tajawal';font-weight:700;font-size:13px;cursor:pointer}
.btn.grn{background:var(--palm)}
.btn.gry{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn:disabled{opacity:.5}
.btn-w{width:100%;padding:13px;font-size:15px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:13px;background:var(--card);border:1px solid var(--line);color:var(--txt-dim);cursor:pointer}
.tab.on{background:var(--sadu);border-color:var(--sadu);color:#fff;font-weight:700}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:14px}
.pcard img{width:100%;height:170px;object-fit:cover;display:block}
.pbody{padding:12px 14px}
.ptitle{font-weight:700;font-size:15px;margin-bottom:4px}
.pmeta{font-size:12px;color:var(--txt-dim);margin-bottom:10px;line-height:1.8}
.flags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.flag{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700}
.flag.rep{background:rgba(242,179,61,.15);color:var(--star);border:1px solid var(--star)}
.flag.hid{background:rgba(192,57,43,.15);color:var(--sadu);border:1px solid var(--sadu)}
.flag.ban{background:rgba(192,57,43,.3);color:#fff;border:1px solid var(--sadu)}
.acts{display:flex;gap:8px;flex-wrap:wrap}
.empty{text-align:center;color:var(--txt-dim);padding:40px 20px;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--palm);color:#fff;padding:11px 22px;border-radius:14px;font-size:14px;font-weight:700;z-index:99;display:none;white-space:nowrap}
.toast.err{background:var(--sadu)}
#panel{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="sadu"></div>
<div class="topbar">
  <div><h1>👮 لوحة الإشراف</h1><div class="sub">صورة من بلدي — للمشرف فقط</div></div>
  <button class="btn gry" id="outBtn" style="display:none" onclick="logout()">خروج</button>
</div>

<div class="box" id="loginBox">
  <input type="email" id="email" placeholder="إيميل المشرف" autocomplete="username">
  <input type="password" id="pass" placeholder="كلمة السر" autocomplete="current-password">
  <button class="btn btn-w" id="inBtn" onclick="login()">دخول</button>
</div>

<div id="panel">
  <div class="tabs">
    <div class="tab on" id="tRep" onclick="setTab('rep')">🚩 المبلغ عنها</div>
    <div class="tab" id="tAll" onclick="setTab('all')">🗂️ كل الصور</div>
  </div>
  <div id="list"><div class="empty">⏳ جاري التحميل...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = "https://gquzjaxpqeggknhipmzk.supabase.co";
const SB_KEY = "sb_publishable_BNp6Fg3VLXa1Pf4V6QjncQ_f496PquX";
const sb = supabase.createClient(SB_URL, SB_KEY);
const $=id=>document.getElementById(id);
let tab='rep', photos=[], repCounts={};
function toast(m,err){const t=$('toast');t.textContent=m;t.className='toast'+(err?' err':'');t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
function imgUrl(p){return sb.storage.from('photos').getPublicUrl(p).data.publicUrl}

async function login(){
  const b=$('inBtn');b.disabled=true;b.textContent='⏳';
  const { data, error } = await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('pass').value});
  b.disabled=false;b.textContent='دخول';
  if(error){toast('بيانات الدخول غير صحيحة',true);return}
  await afterLogin();
}
async function afterLogin(){
  // التحقق أن الحساب مشرف فعلاً
  const { data } = await sb.from('admins').select('id').maybeSingle();
  if(!data){toast('هذا الحساب ليس مشرفاً',true);await sb.auth.signOut();return}
  $('loginBox').style.display='none';$('panel').style.display='block';$('outBtn').style.display='block';
  await load();
}
async function logout(){await sb.auth.signOut();location.reload()}

async function load(){
  const [ph,rp]=await Promise.all([
    sb.from('photos').select('*, profiles!user_id(display_name, banned)').order('created_at',{ascending:false}),
    sb.from('reports').select('photo_id')
  ]);
  photos=ph.data||[];
  repCounts={};
  (rp.data||[]).forEach(r=>repCounts[r.photo_id]=(repCounts[r.photo_id]||0)+1);
  render();
}
function setTab(t){tab=t;$('tRep').classList.toggle('on',t==='rep');$('tAll').classList.toggle('on',t==='all');render()}

function render(){
  let list=tab==='rep'?photos.filter(p=>(repCounts[p.id]||0)>0||p.hidden):photos;
  if(!list.length){$('list').innerHTML=`<div class="empty">${tab==='rep'?'✅ ما فيه بلاغات — الساحة نظيفة':'ما فيه صور بعد'}</div>`;return}
  $('list').innerHTML=list.map(p=>{
    const rc=repCounts[p.id]||0;
    return `<div class="pcard">
      <img src="${imgUrl(p.image_path)}" loading="lazy">
      <div class="pbody">
        <div class="ptitle">${p.title}</div>
        <div class="pmeta">📷 ${p.profiles?.display_name||'?'} · 📍 ${p.city}${p.village?' · '+p.village:''} · ${new Date(p.created_at).toLocaleDateString('ar-SA')}</div>
        <div class="flags">
          ${rc?`<span class="flag rep">🚩 ${rc} بلاغ</span>`:''}
          ${p.hidden?`<span class="flag hid">مخفية</span>`:''}
          ${p.profiles?.banned?`<span class="flag ban">صاحبها محظور</span>`:''}
        </div>
        <div class="acts">
          <button class="btn ${p.hidden?'grn':'gry'}" onclick="toggleHide(${p.id},${!p.hidden})">${p.hidden?'👁️ إظهار':'🙈 إخفاء'}</button>
          <button class="btn" onclick="delPhoto(${p.id},'${p.image_path}')">🗑️ حذف نهائي</button>
          <button class="btn ${p.profiles?.banned?'grn':'gry'}" onclick="toggleBan('${p.user_id}',${!(p.profiles?.banned)})">${p.profiles?.banned?'فك الحظر':'⛔ حظر المصور'}</button>
          ${rc?`<button class="btn gry" onclick="clearReports(${p.id})">مسح البلاغات</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleHide(id,hide){
  const { error } = await sb.from('photos').update({hidden:hide}).eq('id',id);
  if(error){toast('فشلت العملية',true);return}
  toast(hide?'أُخفيت الصورة':'أُظهرت الصورة');await load();
}
async function delPhoto(id,path){
  if(!confirm('حذف نهائي؟ لا يمكن التراجع.'))return;
  const { error } = await sb.from('photos').delete().eq('id',id);
  if(error){toast('فشل الحذف',true);return}
  await sb.storage.from('photos').remove([path]);
  toast('حُذفت الصورة نهائياً');await load();
}
async function toggleBan(uid,ban){
  if(ban&&!confirm('حظر المصور؟ لن يستطيع النشر أو التعليق.'))return;
  const { error } = await sb.from('profiles').update({banned:ban}).eq('id',uid);
  if(error){toast('فشلت العملية',true);return}
  toast(ban?'تم حظر المصور ⛔':'فُك الحظر');await load();
}
async function clearReports(id){
  const { error } = await sb.from('reports').delete().eq('photo_id',id);
  if(error){toast('فشلت العملية',true);return}
  toast('مُسحت البلاغات');await load();
}

// جلسة سابقة؟
(async()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session && !session.user.is_anonymous) await afterLogin();
})();
</script>
</body>
</html>
